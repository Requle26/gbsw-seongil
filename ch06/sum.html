<!-- html input 통해 n 입력 받기 -->
<!-- 1 ~ n까지의 누적합을 반복문을 통해 계산-->
<!-- 누적합을 문서에 출력 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        #plus {
            color: rgb(0, 145, 255);
        }

        #btn {
            background-color: ivory;
            color: rgb(0, 183, 255);
        }

        #input_number {
            background-color: ivory;
        }
    </style>

    <h1 id = 'plus'>누적합을 출력해보자</h1>
    <input
        id = 'input_number'
        type="number"
        placeholder="정수를 입력해주세요."
        />
        <button id="btn" type="button">완료</button>
        <div id = 'result'></div>
</body>
</html>
<script>
    document.getElementById("btn").onclick = function () {
        const num = document.getElementById('input_number').value;
        let temp = 0;
        for (let i = 0; i <= num; i++) {
            temp += i;
        };
        document.getElementById("result").textContent = temp;
};
</script>
